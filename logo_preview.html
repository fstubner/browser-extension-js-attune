<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attune Logo Preview</title>
    <style>
        body {
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container {
            text-align: center;
            background: #1e293b;
            padding: 3rem;
            border-radius: 1rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

        img {
            max-width: 256px;
            height: auto;
            margin-bottom: 1.5rem;
            border-radius: 1rem; /* Showcasing how it looks clipped */
        }
        p {
            color: #94a3b8;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Option 9b: Rounded Arrow</h1>
        <img src="logo_preview.png" alt="Logo Preview" />
        <p>This image is loaded from <code>logo_preview.png</code> in your project root.</p>

</html>
